<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=web/site/index.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElephantNote</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #081017;
            --panel: #101923;
            --line: rgba(126, 215, 185, 0.25);
            --text: #eef4f8;
            --muted: #9bb2c7;
            --accent: #7ed7b9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(126, 215, 185, 0.14), transparent 24rem),
                linear-gradient(165deg, #081017 0%, #0d151d 100%);
            color: var(--text);
        }

        main {
            width: min(560px, 100%);
            padding: 28px;
            border-radius: 24px;
            background: rgba(16, 25, 35, 0.88);
            border: 1px solid var(--line);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 14px;
            color: var(--muted);
            line-height: 1.6;
        }

        a {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main>
        <h1>ElephantNote</h1>
        <p>Le point d'entree web canonique se trouve maintenant dans <code>web/site</code>.</p>
        <p>Redirection automatique en cours. Si rien ne se passe, ouvre <a href="web/site/index.html">la landing ElephantNote</a>.</p>
    </main>
</body>
</html>
