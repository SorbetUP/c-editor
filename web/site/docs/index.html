<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElephantNote Web - Éditeur Hybride</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: #2d2d2d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffa500;
        }

        .status-indicator.ready {
            background: #51cf66;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            background: #4c6ef5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #364fc7;
        }

        .main-content {
            display: flex;
            height: calc(100vh - 60px);
        }

        .hybrid-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .pane-header {
            background: #2d2d2d;
            padding: 10px 20px;
            border-bottom: 1px solid #444;
            font-weight: 600;
            font-size: 14px;
        }

        .hybrid-editor-container {
            flex: 1;
            padding: 20px;
        }

        #hybridEditor {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 20px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.8;
            overflow-y: auto;
            outline: none;
        }

        #hybridEditor:focus {
            border-color: #4c6ef5;
        }

        .editor-line {
            min-height: 1.8em;
            padding: 4px 8px;
            margin: 0;
            border-radius: 3px;
            transition: background-color 0.2s ease;
            cursor: text;
        }

        .editor-line.current-line {
            background-color: rgba(76, 110, 245, 0.1);
            border-left: 3px solid #4c6ef5;
            padding-left: 15px;
        }

        .editor-line.rendered-line {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .editor-line:empty::before {
            content: '\200B';
            color: transparent;
        }

        /* Styling for rendered HTML */
        .editor-line h1, .editor-line h2, .editor-line h3, .editor-line h4, .editor-line h5, .editor-line h6 {
            margin: 0;
            color: #fff;
            display: inline;
        }

        .editor-line h1 { font-size: 24px; }
        .editor-line h2 { font-size: 20px; }
        .editor-line h3 { font-size: 18px; }

        .editor-line strong {
            color: #fff;
            font-weight: bold;
        }

        .editor-line em {
            color: #ffd93d;
            font-style: italic;
        }

        .editor-line u {
            text-decoration: underline;
        }

        .editor-line mark {
            background: #ffd93d;
            color: #000;
            padding: 1px 2px;
        }

        .editor-line a {
            color: #8cc8ff;
            text-decoration: underline;
        }

        .editor-line code {
            padding: 1px 5px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffd37e;
        }

        .editor-line pre,
        .editor-line ul,
        .editor-line ol,
        .editor-line dl,
        .editor-line blockquote,
        .editor-line table,
        .editor-line hr {
            margin: 0;
        }

        .editor-line pre {
            padding: 10px 12px;
            border-radius: 10px;
            background: #11161c;
            border: 1px solid #2d3844;
            overflow-x: auto;
        }

        .editor-line pre code {
            padding: 0;
            background: transparent;
            color: #d9e3ec;
        }

        .editor-line blockquote {
            padding-left: 12px;
            border-left: 3px solid #4c6ef5;
            color: #c9d7e4;
        }

        .editor-line img {
            display: block;
            max-width: min(100%, 320px);
            height: auto;
            border-radius: 10px;
            border: 1px solid #33404d;
        }

        .editor-line table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .editor-line th,
        .editor-line td {
            padding: 6px 8px;
            border: 1px solid #394553;
            text-align: left;
        }

        .editor-line th {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        .editor-line dd {
            margin: 4px 0 0 18px;
            color: #c9d7e4;
        }

        .editor-line hr {
            border: 0;
            border-top: 1px solid #425060;
        }

        .collapsed-block-line {
            min-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            margin: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .footer {
            background: #2d2d2d;
            padding: 8px 20px;
            border-top: 1px solid #444;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ElephantNote Web - Éditeur Hybride</h1>
        <div class="status">
            <span class="status-indicator" id="statusIndicator"></span>
            <span id="statusText">Chargement...</span>
        </div>
        <div class="buttons">
            <button class="btn" onclick="importMarkdown()">📂 Import MD</button>
            <button class="btn" onclick="exportMarkdown()">📄 Export MD</button>
        </div>
    </div>

    <div class="main-content">
        <div class="hybrid-editor">
            <div class="pane-header">Éditeur Hybride - Ligne courante en Markdown, autres lignes rendues</div>
            <div class="hybrid-editor-container">
                <div id="hybridEditor" contenteditable="true" spellcheck="false">
                    <div class="editor-line" data-line="0">Chargement du document de demonstration...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        ElephantNote Web - Powered by Emscripten WASM | 
        <a href="https://github.com/SorbetUP/c-editor" style="color: #4c6ef5;">GitHub</a>
    </div>

    <script src="editor.js"></script>
    <script src="cursor_wasm.js"></script>
    <script src="cursor_c_interface.js"></script>
    <script>
        let editorModule = null;
        let isWasmReady = false;
        
        const hybridEditor = document.getElementById('hybridEditor');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        
        let currentLineIndex = -1;
        let editorLines = [];
        let lineContents = [];
        const DEFAULT_MARKDOWN_EXAMPLE = [
            "# ElephantNote - Document de validation",
            "",
            "Paragraphe simple pour verifier le rendu de base et la stabilite generale du moteur.",
            "",
            "## Titres",
            "### Niveau 3",
            "#### Niveau 4",
            "##### Niveau 5",
            "###### Niveau 6",
            "",
            "## Styles inline",
            "Texte de validation: **gras**, *italique*, ***gras+italique***, `code`, ~~barre~~, ==surligne==, ++souligne++, [lien inline](https://example.com) et ![image inline](https://placehold.co/24x24/png).",
            "",
            "## Listes a puces",
            "- Premier item",
            "- Deuxieme item avec **gras**",
            "- Troisieme item avec [lien](https://example.com/docs)",
            "",
            "## Listes ordonnees",
            "1. Etape une",
            "2. Etape deux",
            "3. Etape trois",
            "",
            "## Task lists",
            "- [ ] Tache ouverte",
            "- [x] Tache terminee",
            "",
            "## Listes de definition",
            "Markdown",
            ": Langage de balisage leger",
            "ElephantNote",
            ": Projet unifie avec sous-librairies C et WASM",
            "",
            "## Blockquotes",
            "> Citation simple",
            "> Deuxieme ligne de citation avec *italique*",
            "",
            "## Regles horizontales",
            "---",
            "***",
            "",
            "## Bloc de code fenced",
            "```c",
            "#include <stdio.h>",
            "",
            "int main(void) {",
            "    printf(\"hello from elephantnote\\n\");",
            "    return 0;",
            "}",
            "```",
            "",
            "## Image bloc",
            "![Capture de test](https://placehold.co/320x160/png?text=C+Editor)",
            "",
            "## Tableau pipe",
            "| Type | Exemple | Etat |",
            "| --- | --- | --- |",
            "| Titre | # Heading | OK |",
            "| Inline | **gras** | OK |",
            "| Lien local | [Note locale](Notes/exemple.md) | OK |",
            "",
            "## Liens",
            "- [Lien web](https://example.com)",
            "- [Note locale](Notes/exemple.md)",
            "- [Fichier local](file:///Users/demo/Documents/exemple.md)"
        ].join('\n');
        // C cursor manager available globally as cCursorManager

        // Initialize WASM module
        async function initializeWasm() {
            try {
                statusText.textContent = 'Chargement WASM...';
                
                // Initialize C Cursor Management Module first
                let cursorModule = null;
                try {
                    console.log('🎯 Loading C Cursor Management WASM...');
                    if (typeof CursorModule !== 'undefined') {
                        cursorModule = await CursorModule();
                        cCursorManager = initializeCCursorManager(cursorModule);
                        console.log('✅ C Cursor Management initialized');
                    }
                } catch (error) {
                    console.warn('⚠️ C Cursor Management not available:', error);
                }
                
                // Wait for EditorModule to be available
                let attempts = 0;
                const maxAttempts = 50;
                
                while (typeof EditorModule === 'undefined' && attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }
                
                if (typeof EditorModule !== 'undefined') {
                    console.log('EditorModule found, initializing...');
                    editorModule = await EditorModule();
                    isWasmReady = true;
                    statusIndicator.classList.add('ready');
                    statusText.textContent = cursorModule ? 'WASM + C Cursor Ready' : 'WASM Ready';
                    console.log('WASM module loaded successfully');
                    
                    // Initialize C engine first
                    console.log('🔧 Initializing C engine...');
                    try {
                        const initResult = editorModule.ccall('editor_library_init', 'number', [], []);
                        console.log('✅ C ENGINE INIT RESULT:', initResult);
                        
                        // Enable debug logging
                        try {
                            editorModule.ccall('editor_enable_debug_logging', 'void', ['boolean'], [true]);
                            console.log('✅ C ENGINE DEBUG ENABLED');
                        } catch (error) {
                            console.warn('Debug logging not available:', error);
                        }
                        
                        // Test C engine immediately
                        console.log('🧪 Testing C engine...');
                        const testJson = editorModule.ccall('editor_parse_markdown_simple', 'string', ['string'], ['**test**']);
                        console.log('✅ C ENGINE JSON TEST:', testJson);
                        
                        // Test new HTML function
                        const testHtml = editorModule.ccall('editor_markdown_to_html', 'string', ['string'], ['**test**']);
                        console.log('✅ C ENGINE HTML TEST:', testHtml);
                    } catch (error) {
                        console.error('❌ C ENGINE TEST FAILED:', error);
                    }
                    
                    // Re-render lines with C engine
                    if (editorLines.length > 0) {
                        editorLines.forEach((line, index) => {
                            if (index !== currentLineIndex) {
                                renderLineAsHTML(index);
                            }
                        });
                    }
                } else {
                    throw new Error('EditorModule not found after ' + maxAttempts + ' attempts');
                }
            } catch (error) {
                console.warn('WASM not available:', error);
                statusIndicator.style.background = '#ff6b6b';
                statusText.textContent = '❌ WASM indisponible - Mode JavaScript';
                isWasmReady = false;
            }
        }

        // FALLBACK COMPLETELY REMOVED - ONLY C ENGINE ALLOWED

        // Simple JSON to HTML - using C engine JSON output (NOT JavaScript markdown)
        function jsonToHtmlSimple(jsonStr) {
            try {
                const doc = JSON.parse(jsonStr);
                if (!doc.elements || doc.elements.length === 0) {
                    return '';
                }

                const renderSpan = (span) => {
                    if (!span) return '';

                    if (span.image && span.src) {
                        return `<img src="${escapeHtml(span.src)}" alt="${escapeHtml(span.alt || span.text || '')}" />`;
                    }

                    let html = escapeHtml(span.text || '');

                    if (span.code) html = `<code>${html}</code>`;
                    if (span.italic) html = `<em>${html}</em>`;
                    if (span.bold) html = `<strong>${html}</strong>`;
                    if (span.has_underline) html = `<u>${html}</u>`;
                    if (span.has_highlight) html = `<mark>${html}</mark>`;
                    if (span.strikethrough) html = `<del>${html}</del>`;
                    if (span.link && span.href) {
                        html = `<a href="${escapeHtml(span.href)}">${html}</a>`;
                    }

                    return html;
                };

                const renderTextNode = (node, wrapHeaders = true) => {
                    if (!node) return '';

                    let html = '';
                    if (node.spans && node.spans.length > 0) {
                        html = node.spans.map(renderSpan).join('');
                    } else {
                        html = renderSpan({
                            text: node.text || '',
                            bold: !!node.bold,
                            italic: !!node.italic,
                            code: !!node.code,
                            strikethrough: !!node.strikethrough,
                            has_underline: !!node.has_underline || !!node.underline,
                            has_highlight: !!node.has_highlight || !!node.highlight
                        });
                    }

                    if (wrapHeaders && node.level > 0) {
                        html = `<h${node.level}>${html}</h${node.level}>`;
                    }

                    return html;
                };

                const normalizeTableRows = (rows) => {
                    if (!Array.isArray(rows)) return [];
                    return rows.map((row) => {
                        if (!Array.isArray(row)) return [];
                        return row.map((cell) => Array.isArray(cell) ? (cell[0] || null) : cell);
                    });
                };

                const renderElement = (element) => {
                    if (!element) return '';

                    switch (element.type) {
                        case 'text':
                            return renderTextNode(element, true);
                        case 'image':
                            return `<img src="${escapeHtml(element.src || '')}" alt="${escapeHtml(element.alt || '')}" />`;
                        case 'code':
                            return `<pre><code${element.language ? ` class="language-${escapeHtml(element.language)}"` : ''}>${escapeHtml(element.content || '')}</code></pre>`;
                        case 'quote':
                            return `<blockquote>${(element.items || []).map((item) => renderTextNode(item, false)).join('<br />')}</blockquote>`;
                        case 'list':
                            if (element.kind === 'definition') {
                                return `<dl>${(element.items || []).map((item) => `<dt>${renderTextNode(item.term, false)}</dt><dd>${renderTextNode(item.definition, false)}</dd>`).join('')}</dl>`;
                            }

                            const tag = element.ordered ? 'ol' : 'ul';
                            const startAttr = element.ordered && element.start ? ` start="${element.start}"` : '';
                            return `<${tag}${startAttr}>${(element.items || []).map((item) => {
                                const checkbox = item.checkbox
                                    ? `<input type="checkbox"${item.checked ? ' checked' : ''} disabled /> `
                                    : '';
                                return `<li>${checkbox}${renderTextNode(item.text, false)}</li>`;
                            }).join('')}</${tag}>`;
                        case 'table':
                            const headerRows = normalizeTableRows(element.header);
                            const bodyRows = normalizeTableRows(element.rows);
                            return `<table><thead>${headerRows.map((row) => `<tr>${row.map((cell) => `<th>${renderTextNode(cell, false)}</th>`).join('')}</tr>`).join('')}</thead><tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${renderTextNode(cell, false)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
                        case 'divider':
                            return '<hr />';
                        default:
                            return '';
                    }
                };

                return doc.elements.map(renderElement).join('\n');
            } catch (error) {
                console.warn('C ENGINE JSON parsing error:', error);
                return '';
            }
        }

        // Get current cursor line
        function getCurrentLineElement() {
            const selection = window.getSelection();
            if (selection.rangeCount === 0) {
                console.log('🚫 getCurrentLineElement: No selection');
                return null;
            }
            
            let node = selection.anchorNode;
            console.log(`🔍 getCurrentLineElement: Starting from node:`, node);
            
            // Find the parent .editor-line element
            while (node && node !== hybridEditor) {
                if (node.classList && node.classList.contains('editor-line')) {
                    console.log(`✅ getCurrentLineElement: Found editor-line:`, node);
                    return node;
                }
                console.log(`🔍 getCurrentLineElement: Moving to parent:`, node.parentNode);
                node = node.parentNode;
            }
            
            console.log('❌ getCurrentLineElement: No editor-line found');
            return null;
        }
        
        // Update line states (current vs rendered)
        function updateLineStates() {
            const currentLine = getCurrentLineElement();
            const newLineIndex = currentLine ? parseInt(currentLine.dataset.line) : -1;
            
            console.log(`🔄 updateLineStates: currentLine=`, currentLine, `newLineIndex=${newLineIndex}`);
            
            // If we can't find a current line, try to maintain the previous state
            if (newLineIndex === -1) {
                console.log(`⚠️ No current line found, maintaining currentLineIndex=${currentLineIndex}`);
                // Don't change currentLineIndex if we can't find a line
                // This prevents losing track of the current line
                return;
            }
            
            // Validate new line index
            if (newLineIndex >= editorLines.length) {
                console.warn(`⚠️ Invalid newLineIndex: ${newLineIndex}, max: ${editorLines.length - 1}`);
                return;
            }
            
            if (newLineIndex === currentLineIndex) return; // No change
            
            console.log('Line changed from', currentLineIndex, 'to', newLineIndex);
            
            // Render the previously current line (if any)
            if (currentLineIndex >= 0 && editorLines[currentLineIndex]) {
                renderLineAsHTML(currentLineIndex);
            }
            
            // Calculate cursor position in the new line BEFORE switching it to markdown
            let targetCursorPosition = 0;
            if (newLineIndex >= 0 && editorLines[newLineIndex]) {
                const newLine = editorLines[newLineIndex];
                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    try {
                        const range = selection.getRangeAt(0);
                        if (newLine.contains(range.startContainer) || range.startContainer === newLine) {
                            const htmlPosition = calculatePlainTextPosition(newLine);
                            
                            // Make sure we have current content - get it from the actual line if needed
                            let markdownContent = lineContents[newLineIndex] || '';
                            if (!markdownContent && newLine.textContent) {
                                markdownContent = newLine.textContent;
                                lineContents[newLineIndex] = markdownContent;
                                console.log(`📝 Updated line content from DOM: "${markdownContent}"`);
                            }
                            
                            targetCursorPosition = mapHtmlPositionToMarkdown(htmlPosition, markdownContent);
                            console.log(`📍 HTML position: ${htmlPosition}, Markdown position: ${targetCursorPosition}`);
                        }
                    } catch (error) {
                        console.warn('Error calculating cursor position:', error);
                    }
                }
            }
            
            // Switch new current line to raw markdown
            if (newLineIndex >= 0 && newLineIndex < editorLines.length) {
                currentLineIndex = newLineIndex;
                showLineAsMarkdownWithPosition(currentLineIndex, targetCursorPosition);
                updateLineClasses();
            } else {
                console.log('⚠️ Invalid line index, attempting to restore focus to a valid line');
                
                // Try to restore focus to a valid line
                if (currentLineIndex >= 0 && currentLineIndex < editorLines.length) {
                    const lineToFocus = editorLines[currentLineIndex];
                    if (lineToFocus) {
                        setTimeout(() => {
                            lineToFocus.focus();
                            console.log(`🔧 Restored focus to line ${currentLineIndex}`);
                        }, 10);
                    }
                } else if (editorLines.length > 0) {
                    // Focus the first available line
                    currentLineIndex = 0;
                    const firstLine = editorLines[0];
                    setTimeout(() => {
                        firstLine.focus();
                        showLineAsMarkdownWithPosition(0, 0);
                        updateLineClasses();
                        console.log(`🔧 Focused first available line`);
                    }, 10);
                }
            }
        }
        
        // Update CSS classes for current/rendered lines
        function updateLineClasses() {
            editorLines.forEach((line, index) => {
                line.classList.remove('current-line', 'rendered-line');
                if (index === currentLineIndex) {
                    line.classList.add('current-line');
                } else {
                    line.classList.add('rendered-line');
                }
            });
        }
        
        function renderMarkdownBlock(markdown) {
            if (!markdown.trim()) return '&nbsp;';
            
            // C engine MUST be ready - no fallback
            if (!isWasmReady || !editorModule) {
                console.error('❌ C ENGINE NOT READY - CANNOT RENDER');
                throw new Error('C ENGINE NOT READY');
            }
            
            // Try direct HTML function first
            try {
                const html = editorModule.ccall('editor_markdown_to_html', 'string', ['string'], [markdown]);
                if (html && html.trim()) {
                    console.log(`✅ C ENGINE HTML DIRECT: "${markdown}" -> "${html}"`);
                    return html;
                }
            } catch (error) {
                console.warn('HTML function failed, trying JSON approach:', error);
            }
            
            // Fallback to JSON approach (still using C engine)
            try {
                const jsonStr = editorModule.ccall('editor_parse_markdown_simple', 'string', ['string'], [markdown]);
                if (jsonStr) {
                    const html = jsonToHtmlSimple(jsonStr);
                    console.log(`✅ C ENGINE JSON: "${markdown}" -> "${html}"`);
                    return html;
                }
            } catch (error) {
                console.error('❌ C ENGINE COMPLETELY FAILED:', error);
                throw new Error('C ENGINE FAILED');
            }
            
            throw new Error('C ENGINE RETURNED EMPTY');
        }

        function renderSingleLine(line) {
            return renderMarkdownBlock(line);
        }
        
        // Escape HTML characters
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function isFenceMarker(line) {
            return /^\s*```/.test(line || '');
        }

        function isTableSeparatorLineJs(line) {
            return /^\s*\|?(?:\s*:?-+:?\s*\|)+\s*:?-+:?\s*\|?\s*$/.test((line || '').trim());
        }

        function isTableRowLine(line) {
            const trimmed = (line || '').trim();
            return trimmed.includes('|') && /^\|?.*\|.*\|?$/.test(trimmed);
        }

        function isListLine(line) {
            return /^\s*(?:[-+*]\s+|\d+\.\s+)/.test(line || '');
        }

        function isDefinitionDescriptionLine(line) {
            return /^\s*:\s+/.test(line || '');
        }

        function isBlockquoteLine(line) {
            return /^\s*>/.test(line || '');
        }

        function getContiguousBlock(index, matcher) {
            const line = lineContents[index] || '';
            if (!matcher(line)) {
                return null;
            }

            let start = index;
            let end = index;

            while (start > 0 && matcher(lineContents[start - 1] || '')) {
                start--;
            }
            while (end + 1 < lineContents.length && matcher(lineContents[end + 1] || '')) {
                end++;
            }

            return {
                start,
                end,
                markdown: lineContents.slice(start, end + 1).join('\n')
            };
        }

        function getFenceBlock(index) {
            let start = -1;
            for (let i = 0; i < lineContents.length; i++) {
                if (isFenceMarker(lineContents[i])) {
                    if (start === -1) {
                        start = i;
                    } else {
                        if (index >= start && index <= i) {
                            return {
                                start,
                                end: i,
                                markdown: lineContents.slice(start, i + 1).join('\n')

                const textNode = currentLine.firstChild;
                if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                    const maxPos = textNode.textContent.length;
                    const safePosition = Math.min(mergePosition, maxPos);
                    range.setStart(textNode, safePosition);
                    console.log(`📍 Delete merge: cursor positioned at ${safePosition}`);
                } else {
                    range.setStart(currentLine, 0);
                }
                
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
            });
        }
        
        // Handle line changes (for other cases)
        function handleLineChange() {
            console.log('🔄 Line change detected');
            
            // Re-scan editor lines
            const newEditorLines = Array.from(hybridEditor.querySelectorAll('.editor-line'));
            
            if (newEditorLines.length !== editorLines.length) {
                console.log(`📊 Line count changed: ${editorLines.length} -> ${newEditorLines.length}`);
                
                // Update arrays
                editorLines = newEditorLines;
                
                // Re-index lines
                editorLines.forEach((line, index) => {
                    line.dataset.line = index;
                });
                
                // Adjust currentLineIndex if necessary
                if (currentLineIndex >= editorLines.length) {
                    currentLineIndex = editorLines.length - 1;
                }
                
                updateLineStates();
            }
        }
        
        // Initialize hybrid editor
        function initializeHybridEditor() {
            console.log('Initializing hybrid editor...');
            
            // C cursor manager is initialized globally as cCursorManager
            // No need for JavaScript CursorManager class anymore
            
            // Get all editor lines
            editorLines = Array.from(hybridEditor.querySelectorAll('.editor-line'));
            
            // Initialize line contents array
            editorLines.forEach((line, index) => {
                lineContents[index] = line.textContent || '';
                line.dataset.line = index;
            });
            
            // Set up event listeners
            hybridEditor.addEventListener('click', () => {
                requestAnimationFrame(updateLineStates); // Faster than setTimeout
            });
            
            hybridEditor.addEventListener('keyup', () => {
                requestAnimationFrame(updateLineStates);
            });
            
            hybridEditor.addEventListener('focus', () => {
                requestAnimationFrame(updateLineStates);
            });
            
            // Handle keyboard events
            hybridEditor.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    // Always use handleEnterKey since it now includes C cursor management
                    handleEnterKey();
                } else if (e.key === 'Backspace') {
                    // Handle backspace specially for line merging
                    const currentLine = getCurrentLineElement();
                    if (currentLine) {
                        const lineIndex = parseInt(currentLine.dataset.line);
                        const currentContent = currentLine.textContent || '';
                        const cursorAtStart = isAtLineStart(currentLine);
                        
                        console.log(`🔍 Backspace: line ${lineIndex}, content: "${currentContent}", at start: ${cursorAtStart}`);
                        
                        // Check if backspace will empty the line
                        const willEmpty = willBackspaceEmptyLine(currentLine);
                        
                        if (willEmpty) {
                            // Don't merge - let backspace empty the line first
                            console.log(`🚫 Backspace will empty line - allowing normal backspace`);
                        } else if (cursorAtStart && currentContent.length === 0 && lineIndex > 0 && lineIndex < editorLines.length) {
                            // Line is already empty and cursor at start - merge with previous line
                            e.preventDefault();
                            console.log(`🚨 Empty line merge - handling backspace at line start`);
                            handleBackspaceAtLineStart(lineIndex);
                        } else if (cursorAtStart && currentContent.length > 0 && lineIndex > 0 && lineIndex < editorLines.length) {
                            // Line has content and cursor at start - merge with previous line
                            e.preventDefault();
                            console.log(`🚨 Non-empty line merge - handling backspace at line start`);
                            handleBackspaceAtLineStart(lineIndex);
                        } else if (cursorAtStart) {
                            console.log(`🚨 At line start but can't merge: lineIndex=${lineIndex}, editorLines.length=${editorLines.length}`);
                        }
                    }
                } else if (e.key === 'Delete') {
                    // Handle delete key for line merging
                    const currentLine = getCurrentLineElement();
                    if (currentLine) {
                        const lineIndex = parseInt(currentLine.dataset.line);
                        const currentContent = currentLine.textContent || '';
                        const cursorAtEnd = isAtLineEnd(currentLine);
                        
                        console.log(`🔍 Delete: line ${lineIndex}, content: "${currentContent}", at end: ${cursorAtEnd}`);
                        
                        // If cursor is at end and there's a next line to merge
                        if (cursorAtEnd && lineIndex < editorLines.length - 1) {
                            e.preventDefault();
                            handleDeleteAtLineEnd(lineIndex);
                        }
                    }
                }
            });
            
            // Handle input changes
            hybridEditor.addEventListener('input', () => {
                // Update line contents for current line
                if (currentLineIndex >= 0 && editorLines[currentLineIndex]) {
                    lineContents[currentLineIndex] = editorLines[currentLineIndex].textContent || '';
                    console.log(`📝 Updated line ${currentLineIndex}:`, lineContents[currentLineIndex]);
                }
            });
            
            // Initial render - render all lines as HTML first
            editorLines.forEach((line, index) => {
                renderLineAsHTML(index);
            });
            
            // Then set first line as current (markdown)
            setTimeout(() => {
                currentLineIndex = 0;
                showLineAsMarkdown(0);
                updateLineClasses();
                
                // Focus first line
                if (editorLines[0]) {
                    editorLines[0].focus();
                    
                    // Place cursor at start
                    const range = document.createRange();
                    const selection = window.getSelection();
                    range.setStart(editorLines[0], 0);
                    range.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
                
                // Initialize tests after editor is ready
                if (typeof CursorTestSuite !== 'undefined') {
                    const testSuite = new CursorTestSuite({
                        mapHtmlPositionToMarkdown,
                        editorLines,
                        lineContents,
                        hybridEditor
                    });
                    
                    console.log('🧪 Running cursor behavior tests...');
                    testSuite.runAllTests();
                }
            }, 100);
        }

        // Import function
        function importMarkdown() {
            // Create a file input element
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.md,.markdown,.txt';
            fileInput.style.display = 'none';
            
            fileInput.onchange = function(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const content = e.target.result;
                        loadMarkdownContent(content);
                        console.log(`✅ Imported markdown file: ${file.name}`);
                    } catch (error) {
                        console.error('❌ Error importing file:', error);
                        alert('Error importing file: ' + error.message);
                    }
                };
                
                reader.onerror = function() {
                    console.error('❌ Error reading file');
                    alert('Error reading file');
                };
                
                reader.readAsText(file);
            };
            
            // Trigger file picker
            document.body.appendChild(fileInput);
            fileInput.click();
            document.body.removeChild(fileInput);
        }
        
        // Load markdown content into editor
        function loadMarkdownContent(markdownText) {
            console.log('🔄 Loading markdown content into editor...');
            
            // Split content into lines
            const lines = markdownText.split('\n');
            
            // Clear current editor
            hybridEditor.innerHTML = '';
            editorLines = [];
            lineContents = [];
            
            // Create new lines
            lines.forEach((lineContent, index) => {
                const lineElement = document.createElement('div');
                lineElement.className = 'editor-line';
                lineElement.dataset.line = index;
                lineElement.textContent = lineContent;
                lineElement.setAttribute('contenteditable', 'true');
                
                hybridEditor.appendChild(lineElement);
                editorLines.push(lineElement);
                lineContents.push(lineContent);
            });
            
            // Set first line as current
            currentLineIndex = 0;
            
            // Render all lines except first as HTML
            editorLines.forEach((line, index) => {
                if (index === 0) {
                    showLineAsMarkdown(index);
                } else {
                    renderLineAsHTML(index);
                }
            });
            
            updateLineClasses();
            
            // Focus first line
            if (editorLines[0]) {
                setTimeout(() => {
                    editorLines[0].focus();
                    
                    // Place cursor at start
                    const range = document.createRange();
                    const selection = window.getSelection();
                    range.setStart(editorLines[0], 0);
                    range.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(range);
                }, 100);
            }
            
            console.log(`✅ Loaded ${lines.length} lines into hybrid editor`);
        }

        // Export functions
        function exportMarkdown() {
            // Collect all line contents as markdown
            const content = lineContents.join('\n');
            downloadFile('document.md', content);
        }


        function downloadFile(filename, content) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async function() {
            await initializeWasm();
            initializeHybridEditor();
            loadMarkdownContent(DEFAULT_MARKDOWN_EXAMPLE);
        });
    </script>
    
    <!-- Fixed Cursor Management System -->
    <script>
        // C-powered cursor management system
        function enhanceEnterKeyBehavior() {
            const originalHandleEnterKey = handleEnterKey;
            
            handleEnterKey = function(e) {
                console.log('🎯 Enhanced Enter key (C-powered) called');
                
                try {
                    // Get current cursor state
                    const currentLine = editorLines[currentLineIndex];
                    if (!currentLine) {
                        console.log('⚠️ No current line, using original handler');
                        return originalHandleEnterKey.call(this, e);
                    }
                    
                    const content = lineContents[currentLineIndex] || '';
                    const isMarkdownMode = currentLine.classList.contains('current-line');
                    
                    // Get cursor position
                    let cursorPosition = 0;
                    const selection = window.getSelection();
                    if (selection.rangeCount > 0) {
                        const range = selection.getRangeAt(0);
                        const preCaretRange = range.cloneRange();
                        preCaretRange.selectNodeContents(currentLine);
                        preCaretRange.setEnd(range.startContainer, range.startOffset);
                        cursorPosition = preCaretRange.toString().length;
                    }
                    
                    // Convert HTML position to markdown if needed
                    let finalPosition = cursorPosition;
                    if (!isMarkdownMode) {
                        finalPosition = mapHtmlPositionToMarkdown(cursorPosition, content);
                    }
                    
                    console.log(`📍 Current: line ${currentLineIndex}, HTML pos ${cursorPosition}, MD pos ${finalPosition}, content: "${content}"`);
                    
                    // Use C cursor management to check if we're in a problematic position
                    if (cCursorManager && cCursorManager.isReady) {
                        console.log('🔧 Using C cursor management for formatting analysis');
                        const isInsideFormatting = cCursorManager.isInsideFormatting(content, finalPosition);
                        
                        if (isInsideFormatting) {
                            console.log('📝 Position is inside formatting - will split the formatted text');
                            // Allow splitting inside formatting - this will divide the formatted content
                            // For example: "- *Ital|ique*" becomes "- *Ital" + "ique*"
                        } else {
                            // Only adjust position if we're at the boundary of formatting markers
                            const adjustedPosition = cCursorManager.adjustForFormatting(finalPosition, content);
                            
                            if (adjustedPosition !== finalPosition) {
                                console.log(`🔧 C library adjusted position: ${finalPosition} -> ${adjustedPosition}`);
                                
                                // Set the adjusted position before proceeding
                                const textNode = currentLine.firstChild;
                                if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                                    const range = document.createRange();
                                    const selection = window.getSelection();
                                    const safePos = Math.min(adjustedPosition, textNode.textContent.length);
                                    
                                    range.setStart(textNode, safePos);
                                    range.collapse(true);
                                    selection.removeAllRanges();
                                    selection.addRange(range);
                                    
                                    console.log(`✅ Cursor repositioned to ${safePos}`);
                                }
                                
                                // Small delay to let position settle
                                setTimeout(() => {
                                    originalHandleEnterKey.call(this, e);
                                }, 10);
                                return;
                            }
                        }
                        
                        console.log('✅ Position is safe for splitting');
                    } else {
                        // Fallback to JavaScript cursor management if C library not available
                        console.log('⚠️ C cursor library not ready, using fallback');
                        const adjustedPosition = adjustCursorForFormatting(content, finalPosition, isMarkdownMode);
                        if (adjustedPosition !== finalPosition) {
                            console.log(`🔧 JS fallback adjusted position: ${finalPosition} -> ${adjustedPosition}`);
                            setCursorPositionInLine(currentLine, adjustedPosition);
                            setTimeout(() => {
                                originalHandleEnterKey.call(this, e);
                            }, 5);
                            return;
                        }
                    }
                    
                } catch (error) {
                    console.log('⚠️ Error in enhanced handler:', error);
                }
                
                // Use original handler
                console.log('✅ Using original Enter key handler');
                return originalHandleEnterKey.call(this, e);
            };
        }
        
        // Adjust cursor position to avoid problematic splits in formatting
        function adjustCursorForFormatting(content, position, isMarkdownMode) {
            // Convert HTML position to markdown if needed
            let markdownPosition = position;
            if (!isMarkdownMode && typeof mapHtmlPositionToMarkdown === 'function') {
                try {
                    markdownPosition = mapHtmlPositionToMarkdown(position, content);
                    console.log(`🔄 Mapped HTML ${position} -> MD ${markdownPosition}`);
                } catch (error) {
                    console.log('⚠️ Position mapping failed:', error);
                }
            }
            
            // Check for highlight markers ==
            if (content.includes('==')) {
                const highlightStart = content.lastIndexOf('==', markdownPosition - 1);
                const highlightEnd = content.indexOf('==', markdownPosition);
                
                if (highlightStart !== -1 && highlightEnd !== -1 && highlightStart !== highlightEnd) {
                    const beforeHighlight = content.substring(0, highlightStart);
                    const highlightCount = (beforeHighlight.match(/==/g) || []).length;
                    
                    if (highlightCount % 2 === 0) {
                        console.log(`🎨 Adjusting position to before highlight: ${highlightStart}`);
                        return highlightStart;
                    }
                }
            }
            
            // Check for italic markers *
            if (content.includes('*')) {
                const italicStart = content.lastIndexOf('*', markdownPosition - 1);
                const italicEnd = content.indexOf('*', markdownPosition);
                
                if (italicStart !== -1 && italicEnd !== -1 && italicStart !== italicEnd) {
                    // Make sure it's not part of **
                    if (content[italicStart - 1] !== '*' && content[italicEnd + 1] !== '*') {
                        const beforeItalic = content.substring(0, italicStart);
                        const italicCount = (beforeItalic.match(/\*/g) || []).length;
                        
                        if (italicCount % 2 === 0) {
                            console.log(`💫 Adjusting position to before italic: ${italicStart}`);
                            return italicStart;
                        }
                    }
                }
            }
            
            return markdownPosition;
        }
        
        // Set cursor position in a line element
        function setCursorPositionInLine(lineElement, position) {
            try {
                lineElement.focus();
                
                const range = document.createRange();
                const selection = window.getSelection();
                
                const textNode = lineElement.firstChild;
                if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                    const maxPos = textNode.textContent.length;
                    const safePosition = Math.min(position, maxPos);
                    
                    range.setStart(textNode, safePosition);
                    range.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(range);
                    
                    console.log(`✅ Cursor positioned at ${safePosition}`);
                    return true;
                } else {
                    range.setStart(lineElement, 0);
                    range.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(range);
                    return true;
                }
            } catch (error) {
                console.log('❌ Error positioning cursor:', error);
                return false;
            }
        }
        
        // Initialize when editor is ready
        const originalInitializeHybridEditor = initializeHybridEditor;
        initializeHybridEditor = function() {
            originalInitializeHybridEditor.call(this);
            
            // Enhance Enter key behavior
            enhanceEnterKeyBehavior();
            
            // Test C cursor management if available
            if (cCursorManager && cCursorManager.isReady) {
                console.log('🧪 Testing C cursor management functions...');
                try {
                    // Test position adjustment
                    const testContent = "Test ==highlight== text";
                    const testPos = 7; // Inside the highlight
                    const adjusted = cCursorManager.adjustForFormatting(testPos, testContent);
                    console.log(`✅ C test: position ${testPos} adjusted to ${adjusted}`);
                    
                    // Test formatting detection
                    const isInside = cCursorManager.isInsideFormatting(testContent, testPos);
                    console.log(`✅ C test: position ${testPos} inside formatting: ${isInside}`);
                } catch (error) {
                    console.error('❌ C cursor management test failed:', error);
                }
            }
            
            console.log('🎯 Cursor positioning system initialized with C library support');
        };
    </script>
