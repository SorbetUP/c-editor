<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElephantNote Web - Éditeur Hybride</title>
    <style>
        :root {
            --page-bg: #f6f5f2;
            --page-ink: #2f3437;
            --muted-ink: #6b6f76;
            --page-bg-top: #fbfaf8;
            --page-glow: rgba(46, 170, 220, 0.12);
            --chrome-bg: rgba(255, 255, 255, 0.78);
            --chrome-border: rgba(55, 53, 47, 0.12);
            --button-bg: rgba(255, 255, 255, 0.9);
            --button-hover-bg: #ffffff;
            --canvas-bg: #fffefc;
            --canvas-border: rgba(55, 53, 47, 0.09);
            --line-hover: rgba(55, 53, 47, 0.03);
            --line-active: rgba(46, 170, 220, 0.12);
            --line-accent: #2eaadc;
            --link-color: #0b6e99;
            --code-bg: rgba(135, 131, 120, 0.15);
            --code-ink: #eb5757;
            --quote-border: rgba(55, 53, 47, 0.18);
            --rule-color: rgba(55, 53, 47, 0.14);
            --table-rule: rgba(55, 53, 47, 0.12);
            --table-rule-strong: rgba(46, 170, 220, 0.35);
            --heading-ink: #111827;
            --italic-ink: #7c5a00;
            --mark-bg: #fde68a;
            --mark-ink: #422006;
            --pre-bg: #11161c;
            --pre-border: #2d3844;
            --pre-code-ink: #d9e3ec;
            --blockquote-ink: #4b5563;
            --blockquote-rich-ink: #c9d7e4;
            --image-border: #33404d;
            --table-border-strong: #394553;
            --table-head-bg: rgba(255, 255, 255, 0.06);
            --table-head-ink: #ffffff;
            --footer-link: #4c6ef5;
            --shadow-soft: 0 16px 48px rgba(15, 23, 42, 0.08);
        }

        body[data-theme="dark"] {
            --page-bg: #000000;
            --page-ink: #f2f2f2;
            --muted-ink: #a1a1aa;
            --page-bg-top: #000000;
            --page-glow: rgba(0, 0, 0, 0);
            --chrome-bg: rgba(0, 0, 0, 0.96);
            --chrome-border: rgba(255, 255, 255, 0.08);
            --button-bg: #050505;
            --button-hover-bg: #111111;
            --canvas-bg: #050505;
            --canvas-border: rgba(255, 255, 255, 0.08);
            --line-hover: rgba(255, 255, 255, 0.05);
            --line-active: rgba(255, 255, 255, 0.08);
            --line-accent: #f2f2f2;
            --link-color: #7dd3fc;
            --code-bg: rgba(255, 255, 255, 0.09);
            --code-ink: #fca5a5;
            --quote-border: rgba(255, 255, 255, 0.18);
            --rule-color: rgba(255, 255, 255, 0.14);
            --table-rule: rgba(255, 255, 255, 0.12);
            --table-rule-strong: rgba(255, 255, 255, 0.22);
            --heading-ink: #ffffff;
            --italic-ink: #f8d66d;
            --mark-bg: #4a3a00;
            --mark-ink: #fff1b8;
            --pre-bg: #000000;
            --pre-border: rgba(255, 255, 255, 0.12);
            --pre-code-ink: #ededed;
            --blockquote-ink: #d4d4d8;
            --blockquote-rich-ink: #e4e4e7;
            --image-border: rgba(255, 255, 255, 0.16);
            --table-border-strong: rgba(255, 255, 255, 0.12);
            --table-head-bg: rgba(255, 255, 255, 0.03);
            --table-head-ink: #ffffff;
            --footer-link: #7dd3fc;
            --shadow-soft: none;
        }

        body[data-theme="dark"] {
            background: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background:
                radial-gradient(circle at top left, var(--page-glow), transparent 28%),
                linear-gradient(180deg, var(--page-bg-top) 0%, var(--page-bg) 100%);
            color: var(--page-ink);
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(18px);
            background: var(--chrome-bg);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--chrome-border);
        }

        .header h1 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f5a524;
        }

        .status-indicator.ready {
            background: #23a55a;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 14px;
            background: var(--button-bg);
            color: var(--page-ink);
            border: 1px solid var(--chrome-border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
        }

        .btn:hover {
            background: var(--button-hover-bg);
            border-color: rgba(46, 170, 220, 0.22);
            transform: translateY(-1px);
        }

        .main-content {
            display: block;
            min-height: calc(100vh - 72px);
        }

        .hybrid-editor {
            display: flex;
            flex-direction: column;
        }

        .pane-header {
            padding: 26px 32px 0;
            border-bottom: none;
            font-weight: 500;
            font-size: 13px;
            color: var(--muted-ink);
        }

        .hybrid-editor-container {
            padding: 18px 24px 72px;
        }

        #hybridEditor {
            width: min(920px, calc(100vw - 48px));
            min-height: calc(100vh - 180px);
            margin: 0 auto;
            background: var(--canvas-bg);
            color: var(--page-ink);
            border: 1px solid var(--canvas-border);
            border-radius: 22px;
            padding: 72px 88px 96px;
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.75;
            overflow: visible;
            outline: none;
            box-shadow: var(--shadow-soft);
        }

        @media (max-width: 720px) {
            #hybridEditor {
                width: calc(100vw - 20px);
                min-height: calc(100vh - 132px);
                border-radius: 16px;
                padding: 40px 22px 72px;
            }
        }

        #hybridEditor:focus {
            border-color: rgba(46, 170, 220, 0.35);
        }

        .editor-line {
            min-height: 1.8em;
            padding: 3px 12px;
            margin: 0;
            border-radius: 8px;
            transition: background-color 0.2s ease;
            cursor: text;
        }

        .editor-line:hover {
            background: var(--line-hover);
        }

        .editor-line.current-line {
            background-color: var(--line-active);
            border-left: 2px solid var(--line-accent);
            padding-left: 18px;
        }

        .editor-line.markdown-visible-edit {
            white-space: pre-wrap;
        }

        .editor-line.layout-locked {
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
        }

        .editor-line.markdown-block-edit {
            white-space: pre-wrap;
        }

        .editor-line.rendered-line {
            background-color: transparent;
        }

        .editor-line:empty::before {
            content: '\200B';
            color: transparent;
        }

        /* Styling for rendered HTML */
        .editor-line h1, .editor-line h2, .editor-line h3, .editor-line h4, .editor-line h5, .editor-line h6 {
            margin: 0;
            color: var(--heading-ink);
            display: inline;
        }

        .editor-line h1 { font-size: 2.3rem; font-weight: 700; letter-spacing: -0.03em; }
        .editor-line h2 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
        .editor-line h3 { font-size: 1.22rem; font-weight: 650; }

        .editor-line strong {
            color: var(--heading-ink);
            font-weight: bold;
        }

        .editor-line em {
            color: var(--italic-ink);
            font-style: italic;
        }

        .editor-line u {
            text-decoration: underline;
        }

        .editor-line mark {
            background: var(--mark-bg);
            color: var(--mark-ink);
            padding: 1px 4px;
            border-radius: 4px;
        }

        .editor-line a {
            color: var(--link-color);
            text-decoration: underline;
            text-underline-offset: 0.15em;
        }

        .editor-line .md-marker {
            color: rgba(107, 111, 118, 0.78);
        }

        .editor-line .list-line .md-marker,
        .editor-line .quote-line .md-marker {
            color: var(--line-accent);
        }

        .editor-line .definition-desc-line .md-marker,
        .editor-line .fence-line .md-marker {
            color: var(--muted-ink);
        }

        .editor-line .md-edit-heading {
            color: var(--heading-ink);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .editor-line .md-edit-heading-1 { font-size: 2.3rem; }
        .editor-line .md-edit-heading-2 { font-size: 1.5rem; }
        .editor-line .md-edit-heading-3 { font-size: 1.22rem; }
        .editor-line .md-edit-heading-4,
        .editor-line .md-edit-heading-5,
        .editor-line .md-edit-heading-6 { font-size: 1rem; font-weight: 650; }

        .editor-line .md-edit-strong { font-weight: 700; color: var(--heading-ink); }
        .editor-line .md-edit-em { font-style: italic; color: var(--italic-ink); }
        .editor-line .md-edit-del { text-decoration: line-through; color: #6b7280; }
        .editor-line .md-edit-mark { background: var(--mark-bg); color: var(--mark-ink); border-radius: 4px; padding: 1px 4px; }
        .editor-line .md-edit-underline { text-decoration: underline; }
        .editor-line .md-edit-code { background: var(--code-bg); color: var(--code-ink); border-radius: 4px; padding: 1px 5px; }
        .editor-line .md-edit-link { color: var(--link-color); text-decoration: underline; text-underline-offset: 0.15em; }
        .editor-line .md-edit-url { color: var(--muted-ink); }
        .editor-line .md-edit-image { color: var(--muted-ink); }

        .editor-line code {
            padding: 1px 5px;
            border-radius: 4px;
            background: var(--code-bg);
            color: var(--code-ink);
        }

        .editor-line .list-line,
        .editor-line .quote-line,
        .editor-line .definition-line,
        .editor-line .table-row-line,
        .editor-line .code-line,
        .editor-line .fence-line {
            display: block;
        }

        .editor-line .list-line {
            padding-left: 1rem;
            text-indent: -1rem;
        }

        .editor-line .list-marker,
        .editor-line .quote-marker {
            color: var(--line-accent);
        }

        .editor-line .definition-line.definition-term-line {
            font-weight: 600;
        }

        .editor-line .definition-line.definition-desc-line {
            padding-left: 1.2rem;
            color: var(--muted-ink);
        }

        .editor-line .quote-line {
            padding-left: 0.9rem;
            border-left: 3px solid var(--quote-border);
            color: var(--blockquote-ink);
        }

        .editor-line .table-row-line {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(0, 1fr);
            gap: 0.5rem;
            align-items: stretch;
        }

        .editor-line.table-markdown-edit {
            padding-top: 1px;
            padding-bottom: 1px;
        }

        .editor-line .table-markdown-line {
            display: grid;
            align-items: center;
            column-gap: 0.35rem;
            min-width: 100%;
            width: max-content;
        }

        .editor-line .table-markdown-pipe {
            color: rgba(55, 53, 47, 0.35);
            justify-self: center;
            user-select: none;
        }

        .editor-line .table-markdown-cell {
            min-width: 0;
            padding: 0.1rem 0.45rem;
            border-bottom: 1px solid var(--table-rule);
            white-space: nowrap;
        }

        .editor-line .table-markdown-cell.table-markdown-rule {
            border-bottom: 2px solid var(--table-rule-strong);
            color: rgba(55, 53, 47, 0.45);
            padding-top: 0;
            padding-bottom: 0;
        }

        .editor-line .table-row-line.table-separator-line {
            gap: 0.5rem;
        }

        .editor-line .table-cell {
            padding: 0.1rem 0.45rem;
            border-bottom: 1px solid var(--table-rule);
            min-width: 0;
        }

        .editor-line .table-row-line.table-header-line .table-cell {
            font-weight: 600;
            color: #111827;
        }

        .editor-line .table-cell.table-rule {
            border-bottom: 2px solid var(--table-rule-strong);
            min-height: 0.5rem;
            padding: 0;
        }

        .editor-line .code-line,
        .editor-line .fence-line {
            white-space: pre-wrap;
        }

        .editor-line .code-line {
            padding-left: 1rem;
            color: var(--page-ink);
        }

        .editor-line .fence-line {
            color: #9ca3af;
        }

        .editor-line pre,
        .editor-line ul,
        .editor-line ol,
        .editor-line dl,
        .editor-line blockquote,
        .editor-line table,
        .editor-line hr {
            margin: 0.15rem 0 0.35rem;
        }

        .editor-line pre {
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--pre-bg);
            border: 1px solid var(--pre-border);
            overflow-x: auto;
        }

        .editor-line pre code {
            padding: 0;
            background: transparent;
            color: var(--pre-code-ink);
        }

        .editor-line ul,
        .editor-line ol {
            padding-left: 1.6rem;
            list-style-position: outside;
        }

        .editor-line ul {
            list-style-type: disc;
        }

        .editor-line ol {
            list-style-type: decimal;
        }

        .editor-line li {
            margin: 0.15rem 0;
        }

        .editor-line .task-list {
            padding-left: 0;
            list-style: none;
        }

        .editor-line .task-list li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.2rem 0;
        }

        .editor-line .task-list input[type="checkbox"] {
            margin: 0;
            accent-color: #4c6ef5;
        }

        .editor-line blockquote {
            padding-left: 12px;
            border-left: 3px solid var(--line-accent);
            color: var(--blockquote-rich-ink);
        }

        .editor-line img {
            display: block;
            max-width: min(100%, 320px);
            height: auto;
            border-radius: 10px;
            border: 1px solid var(--image-border);
        }

        .editor-line table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .editor-line th,
        .editor-line td {
            padding: 6px 8px;
            border: 1px solid var(--table-border-strong);
            text-align: left;
        }

        .editor-line th {
            color: var(--table-head-ink);
            background: var(--table-head-bg);
        }

        .editor-line dd {
            margin: 0.15rem 0 0.45rem 18px;
            color: var(--muted-ink);
        }

        .editor-line hr {
            border: 0;
            border-top: 1px solid var(--rule-color);
        }

        .collapsed-block-line {
            min-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            margin: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .footer {
            padding: 18px 20px 32px;
            border-top: none;
            font-size: 12px;
            color: var(--muted-ink);
            text-align: center;
        }

        .footer a {
            color: var(--footer-link);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ElephantNote Web - Éditeur Hybride</h1>
        <div class="status">
            <span class="status-indicator" id="statusIndicator"></span>
            <span id="statusText">Chargement...</span>
        </div>
        <div class="buttons">
            <button class="btn" id="themeToggle" type="button" onclick="toggleTheme()">🌙 Sombre</button>
            <button class="btn" onclick="importMarkdown()">📂 Import MD</button>
            <button class="btn" onclick="exportMarkdown()">📄 Export MD</button>
        </div>
    </div>

    <div class="main-content">
        <div class="hybrid-editor">
            <div class="pane-header">Éditeur Hybride - Ligne courante en Markdown, autres lignes rendues</div>
            <div class="hybrid-editor-container">
                <div id="hybridEditor" contenteditable="true" spellcheck="false">
                    <div class="editor-line" data-line="0">Chargement du document de demonstration...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        ElephantNote Web - Powered by Emscripten WASM | 
        <a href="https://github.com/SorbetUP/c-editor">GitHub</a>
    </div>

    <script src="editor.js"></script>
    <script src="cursor_wasm.js"></script>
    <script src="cursor_c_interface.js"></script>
    <script>
        let editorModule = null;
        let isWasmReady = false;
        const THEME_STORAGE_KEY = 'elephantnote-theme';
        
        const hybridEditor = document.getElementById('hybridEditor');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const themeToggle = document.getElementById('themeToggle');
        
        let currentLineIndex = -1;
        let editorLines = [];
        let lineContents = [];
        let activeGroupedBlock = null;
        let isRefreshingEditableLine = false;

        function applyTheme(theme) {
            const normalizedTheme = theme === 'dark' ? 'dark' : 'light';
            document.body.dataset.theme = normalizedTheme;
            if (themeToggle) {
                themeToggle.textContent = normalizedTheme === 'dark' ? '☀️ Clair' : '🌙 Sombre';
                themeToggle.setAttribute('aria-pressed', normalizedTheme === 'dark' ? 'true' : 'false');
            }
        }

        function initializeTheme() {
            let savedTheme = null;
            try {
                savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
            } catch (error) {
                console.warn('Unable to read saved theme:', error);
            }

            const preferredTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
            applyTheme(savedTheme || preferredTheme);
        }

        function toggleTheme() {
            const nextTheme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
            applyTheme(nextTheme);
            try {
                localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
            } catch (error) {
                console.warn('Unable to save theme preference:', error);
            }
        }
        const DEFAULT_MARKDOWN_EXAMPLE = [
            "# ElephantNote - Document de validation",
            "",
            "Paragraphe simple pour verifier le rendu de base et la stabilite generale du moteur.",
            "",
            "## Titres",
            "### Niveau 3",
            "#### Niveau 4",
            "##### Niveau 5",
            "###### Niveau 6",
            "",
            "## Styles inline",
            "Texte de validation: **gras**, *italique*, ***gras+italique***, `code`, ~~barre~~, ==surligne==, ++souligne++, [lien inline](https://example.com) et ![image inline](https://placehold.co/24x24/png).",
            "",
            "## Listes a puces",
            "- Premier item",
            "- Deuxieme item avec **gras**",
            "- Troisieme item avec [lien](https://example.com/docs)",
            "",
            "## Listes ordonnees",
            "1. Etape une",
            "2. Etape deux",
            "3. Etape trois",
            "",
            "## Task lists",
            "- [ ] Tache ouverte",
            "- [x] Tache terminee",
            "",
            "## Listes de definition",
            "Markdown",
            ": Langage de balisage leger",
            "ElephantNote",
            ": Projet unifie avec sous-librairies C et WASM",
            "",
            "## Blockquotes",
            "> Citation simple",
            "> Deuxieme ligne de citation avec *italique*",
            "",
            "## Regles horizontales",
            "---",
            "***",
            "",
            "## Bloc de code fenced",
            "```c",
            "#include <stdio.h>",
            "",
            "int main(void) {",
            "    printf(\"hello from elephantnote\\n\");",
            "    return 0;",
            "}",
            "```",
            "",
            "## Image bloc",
            "![Capture de test](https://placehold.co/320x160/png?text=C+Editor)",
            "",
            "## Tableau pipe",
            "| Type | Exemple | Etat |",
            "| --- | --- | --- |",
            "| Titre | # Heading | OK |",
            "| Inline | **gras** | OK |",
            "| Lien local | [Note locale](Notes/exemple.md) | OK |",
            "",
            "## Liens",
            "- [Lien web](https://example.com)",
            "- [Note locale](Notes/exemple.md)",
            "- [Fichier local](file:///Users/demo/Documents/exemple.md)"
        ].join('\n');
        // C cursor manager available globally as cCursorManager

        // Initialize WASM module
        async function initializeWasm() {
            try {
                statusText.textContent = 'Chargement WASM...';
                
                // Initialize C Cursor Management Module first
                let cursorModule = null;
                try {
                    console.log('🎯 Loading C Cursor Management WASM...');
                    if (typeof CursorModule !== 'undefined') {
                        cursorModule = await CursorModule();
                        cCursorManager = initializeCCursorManager(cursorModule);
                        console.log('✅ C Cursor Management initialized');
                    }
                } catch (error) {
                    console.warn('⚠️ C Cursor Management not available:', error);
                }
                
                // Wait for EditorModule to be available
                let attempts = 0;
                const maxAttempts = 50;
                
                while (typeof EditorModule === 'undefined' && attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }
                
                if (typeof EditorModule !== 'undefined') {
                    console.log('EditorModule found, initializing...');
                    editorModule = await EditorModule();
                    isWasmReady = true;
                    statusIndicator.classList.add('ready');
                    statusText.textContent = cursorModule ? 'WASM + C Cursor Ready' : 'WASM Ready';
                    console.log('WASM module loaded successfully');
                    
                    // Initialize C engine first
                    console.log('🔧 Initializing C engine...');
                    try {
                        const initResult = editorModule.ccall('editor_library_init', 'number', [], []);
                        console.log('✅ C ENGINE INIT RESULT:', initResult);
                        
                        // Enable debug logging
                        try {
                            editorModule.ccall('editor_enable_debug_logging', 'void', ['boolean'], [true]);
                            console.log('✅ C ENGINE DEBUG ENABLED');
                        } catch (error) {
                            console.warn('Debug logging not available:', error);
                        }
                        
                        // Test C engine immediately
                        console.log('🧪 Testing C engine...');
                        const testJson = editorModule.ccall('editor_parse_markdown_simple', 'string', ['string'], ['**test**']);
                        console.log('✅ C ENGINE JSON TEST:', testJson);
                        
                        // Test new HTML function
                        const testHtml = editorModule.ccall('editor_markdown_to_html', 'string', ['string'], ['**test**']);

        // Simple JSON to HTML - using C engine JSON output (NOT JavaScript markdown)
        function jsonToHtmlSimple(jsonStr) {
            try {
                const doc = JSON.parse(jsonStr);
                if (!doc.elements || doc.elements.length === 0) {
                    return '';
                }

                const renderSpan = (span) => {
                    if (!span) return '';

                    if (span.image && span.src) {
                        return `<img src="${escapeHtml(span.src)}" alt="${escapeHtml(span.alt || span.text || '')}" />`;
                    }

                    let html = escapeHtml(span.text || '');

                    if (span.code) html = `<code>${html}</code>`;
                    if (span.italic) html = `<em>${html}</em>`;
                    if (span.bold) html = `<strong>${html}</strong>`;
                    if (span.has_underline) html = `<u>${html}</u>`;
                    if (span.has_highlight) html = `<mark>${html}</mark>`;
                    if (span.strikethrough) html = `<del>${html}</del>`;
                    if (span.link && span.href) {
                        html = `<a href="${escapeHtml(span.href)}">${html}</a>`;
                    }

                    return html;
                };

                const renderTextNode = (node, wrapHeaders = true) => {
                    if (!node) return '';

                    let html = '';
                    if (node.spans && node.spans.length > 0) {
                        html = node.spans.map(renderSpan).join('');
                    } else {
                        html = renderSpan({
                            text: node.text || '',
                            bold: !!node.bold,
                            italic: !!node.italic,
                            code: !!node.code,
                            strikethrough: !!node.strikethrough,
                            has_underline: !!node.has_underline || !!node.underline,
                            has_highlight: !!node.has_highlight || !!node.highlight
                        });
                    }

                    if (wrapHeaders && node.level > 0) {
                        html = `<h${node.level}>${html}</h${node.level}>`;
                    }

                    return html;
                };

                const normalizeTableRows = (rows) => {
                    if (!Array.isArray(rows)) return [];
                    return rows.map((row) => {
                        if (!Array.isArray(row)) return [];
                        return row.map((cell) => Array.isArray(cell) ? (cell[0] || null) : cell);
                    });
                };

                const renderElement = (element) => {
                    if (!element) return '';

                    switch (element.type) {
                        case 'text':
                            return renderTextNode(element, true);
                        case 'image':
                            return `<img src="${escapeHtml(element.src || '')}" alt="${escapeHtml(element.alt || '')}" />`;
                        case 'code':
                            return `<pre><code${element.language ? ` class="language-${escapeHtml(element.language)}"` : ''}>${escapeHtml(element.content || '')}</code></pre>`;
                        case 'quote':
                            return `<blockquote>${(element.items || []).map((item) => renderTextNode(item, false)).join('<br />')}</blockquote>`;
                        case 'list':
                            if (element.kind === 'definition') {
                                return `<dl>${(element.items || []).map((item) => `<dt>${renderTextNode(item.term, false)}</dt><dd>${renderTextNode(item.definition, false)}</dd>`).join('')}</dl>`;
                            }

                            const tag = element.ordered ? 'ol' : 'ul';
                            const startAttr = element.ordered && element.start ? ` start="${element.start}"` : '';
                            const classAttr = !element.ordered && element.kind === 'task' ? ' class="task-list"' : '';
                            return `<${tag}${startAttr}${classAttr}>${(element.items || []).map((item) => {
                                const checkbox = item.checkbox
                                    ? `<input type="checkbox"${item.checked ? ' checked' : ''} disabled /> `
                                    : '';
                                return `<li>${checkbox}${renderTextNode(item.text, false)}</li>`;
                            }).join('')}</${tag}>`;
                        case 'table':
                            const headerRows = normalizeTableRows(element.header);
                            const bodyRows = normalizeTableRows(element.rows);
                            return `<table><thead>${headerRows.map((row) => `<tr>${row.map((cell) => `<th>${renderTextNode(cell, false)}</th>`).join('')}</tr>`).join('')}</thead><tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${renderTextNode(cell, false)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
                        case 'divider':
                            return '<hr />';
                        default:
                            return '';
                    }
                };

                return doc.elements.map(renderElement).join('\n');
            } catch (error) {
                console.warn('C ENGINE JSON parsing error:', error);
                return '';
            }
        }

        function renderMarkdownBlock(markdown) {

        function isFenceMarker(line) {

        }

        function isListLine(line) {

        function getContiguousBlock(index, matcher) {

            while (start > 0 && matcher(lineContents[start - 1] || '')) {

            while (end + 1 < lineContents.length && matcher(lineContents[end + 1] || '')) {

        // Map position from rendered HTML text to markdown text position

                        if (endPos !== -1) {

                            htmlPos += innerText.length;
                            i = endPos + 1;

                        console.log(`🌟 Highlight: "==${innerText}==" at MD ${i}, HTML will be ${htmlPos}-${htmlPos + innerText.length - 1}`);
                        
                        // Map each HTML position inside the highlight text to corresponding MD position
                        for (let j = 0; j < innerText.length; j++) {

                        i = endPos + 2;

                    if (endPos !== -1) {

                        console.log(`🔸 Underline: "++${innerText}++" at MD ${i}, HTML will be ${htmlPos}-${htmlPos + innerText.length - 1}`);

                htmlPos++;

            // Return the mapped position
            const result = mapping[htmlPosition] !== undefined ? mapping[htmlPosition] : markdownText.length;
            
            // Show relevant portion of mapping table for debugging
            const showFrom = Math.max(0, htmlPosition - 3);
            const showTo = Math.min(mapping.length, htmlPosition + 8);

            console.log(`🎯 Mapping table [${showFrom}-${showTo-1}]:`, relevantMapping);
            console.log(`🔢 HTML indices [${showFrom}-${showTo-1}]:`, indices);

        // Smart merge that reconstructs formatting when merging split formatted text
        function smartMergeFormattedText(beforeText, afterText, addSpace) {
            console.log(`🔍 smartMergeFormattedText: "${beforeText}" + "${afterText}"`);
            
            // Check if we're merging split formatting
            const beforeEndsWithBold = beforeText.match(/\*\*[^*]*$/);
            const afterStartsWithBold = afterText.match(/^[^*]*\*\*/);
            
            if (beforeEndsWithBold && afterStartsWithBold) {

                const beforeContent = beforeText.match(/\*\*([^*]*)$/)[1];
                const afterContent = afterText.match(/^([^*]*)\*\*/)[1];
                const prefix = beforeText.replace(/\*\*[^*]*$/, '');
                const suffix = afterText.replace(/^[^*]*\*\*/, '');
                
                const mergedFormatted = prefix + '**' + beforeContent + afterContent + '**' + suffix;
                console.log(`🎨 Reconstructed bold: "${mergedFormatted}"`);
                return { text: mergedFormatted, position: prefix.length + 2 + beforeContent.length };
            }
            
            // Check for split italic
            const beforeEndsWithItalic = beforeText.match(/\*[^*]*$/) && !beforeText.match(/\*\*[^*]*$/);
            const afterStartsWithItalic = afterText.match(/^[^*]*\*/) && !afterText.match(/^[^*]*\*\*/);
            
            if (beforeEndsWithItalic && afterStartsWithItalic) {
                // Merging split italic: "*it" + "aly*" should become "*italy*"
                const beforeContent = beforeText.match(/\*([^*]*)$/)[1];
                const afterContent = afterText.match(/^([^*]*)\*/)[1];
                const prefix = beforeText.replace(/\*[^*]*$/, '');
                const suffix = afterText.replace(/^[^*]*\*/, '');
                
                const mergedFormatted = prefix + '*' + beforeContent + afterContent + '*' + suffix;
                console.log(`🎨 Reconstructed italic: "${mergedFormatted}"`);
                return { text: mergedFormatted, position: prefix.length + 1 + beforeContent.length };

            const beforeEndsWithHighlight = beforeText.match(/==[^=]*$/);
            const afterStartsWithHighlight = afterText.match(/^[^=]*==/);
            
            if (beforeEndsWithHighlight && afterStartsWithHighlight) {

                const beforeContent = beforeText.match(/==([^=]*)$/)[1];

                const prefix = beforeText.replace(/==[^=]*$/, '');
                const suffix = afterText.replace(/^[^=]*==/, '');
                
                const mergedFormatted = prefix + '==' + beforeContent + afterContent + '==' + suffix;
                console.log(`🎨 Reconstructed highlight: "${mergedFormatted}"`);
                return { text: mergedFormatted, position: prefix.length + 2 + beforeContent.length };

                    if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                        const range = document.createRange();
                        const selection = window.getSelection();
                        const safePos = Math.min(mergePosition, textNode.textContent.length);
                        
                        try {
                            range.setStart(textNode, safePos);
                            range.collapse(true);
                            selection.removeAllRanges();
                            selection.addRange(range);
                            console.log(`✅ Cursor positioned at ${safePos} in merged line`);
                        } catch (error) {
                            console.warn('Error positioning cursor:', error);
                            // Fallback: position at start of line
                            range.setStart(mergeLine, 0);
                            range.collapse(true);
                            selection.removeAllRanges();
                            selection.addRange(range);
                        }
                    }
                }
            }, 20);
        }
        
        // Handle delete at line end (merge with next line)
        function handleDeleteAtLineEnd(lineIndex) {
            console.log(`🔄 Delete at line end: ${lineIndex}`);
            
            if (lineIndex >= editorLines.length - 1) return; // Can't merge last line
            
            const currentLine = editorLines[lineIndex];
            const nextLine = editorLines[lineIndex + 1];
            
            // Get content of both lines
            const currentContent = lineContents[lineIndex] || currentLine.textContent || '';
            const nextContent = lineContents[lineIndex + 1] || '';
            
            // Use smart merge to reconstruct formatting if needed
            let mergeResult;
            
            if (currentContent.length === 0) {
                // Current line is empty, just use next content
                mergeResult = { text: nextContent, position: 0 };
            } else if (nextContent.length === 0) {
                // Next line is empty, just use current content
                mergeResult = { text: currentContent, position: currentContent.length };
            } else {
                // Both lines have content - use smart merge
                mergeResult = smartMergeFormattedText(currentContent, nextContent, true);
            }
            
            const mergedContent = mergeResult.text;
            const mergePosition = mergeResult.position;
            
            console.log(`🔗 Merging: "${currentContent}" + "${nextContent}" = "${mergedContent}" (cursor at ${mergePosition})"`);
            
            // Update current line content
            lineContents[lineIndex] = mergedContent;
            currentLine.textContent = mergedContent;
            
            // Remove next line
            nextLine.remove();
            editorLines.splice(lineIndex + 1, 1);
            lineContents.splice(lineIndex + 1, 1);
            
            // Re-index remaining lines
            editorLines.forEach((line, index) => {
                line.dataset.line = index;
            });
            
            // Position cursor at merge point
            requestAnimationFrame(() => {
                currentLine.focus();
                const range = document.createRange();
                const selection = window.getSelection();
                
                // Safe cursor positioning at merge point
                const textNode = currentLine.firstChild;
                if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                    const maxPos = textNode.textContent.length;
                    const safePosition = Math.min(mergePosition, maxPos);
                    range.setStart(textNode, safePosition);
                    console.log(`📍 Delete merge: cursor positioned at ${safePosition}`);
                } else {
                    range.setStart(currentLine, 0);
                }
                
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
            });
        }
        
        // Handle line changes (for other cases)
        function handleLineChange() {
            console.log('🔄 Line change detected');
            
            // Re-scan editor lines
            const newEditorLines = Array.from(hybridEditor.querySelectorAll('.editor-line'));
            
            if (newEditorLines.length !== editorLines.length) {
                console.log(`📊 Line count changed: ${editorLines.length} -> ${newEditorLines.length}`);
                
                // Update arrays
                editorLines = newEditorLines;
                
                // Re-index lines
                editorLines.forEach((line, index) => {
                    line.dataset.line = index;
                });
                
                // Adjust currentLineIndex if necessary
                if (currentLineIndex >= editorLines.length) {
                    currentLineIndex = editorLines.length - 1;
                }
                
                updateLineStates();
            }
        }
        
        // Initialize hybrid editor
        function initializeHybridEditor() {
            console.log('Initializing hybrid editor...');
            activeGroupedBlock = null;
            
            // C cursor manager is initialized globally as cCursorManager
            // No need for JavaScript CursorManager class anymore
            
            // Get all editor lines
            editorLines = Array.from(hybridEditor.querySelectorAll('.editor-line'));
            
            // Initialize line contents array
            editorLines.forEach((line, index) => {
                lineContents[index] = line.textContent || '';
                line.dataset.line = index;
            });
            
            // Set up event listeners
            hybridEditor.addEventListener('click', (event) => {
                const link = event.target.closest('a');
                if (link && hybridEditor.contains(link)) {
                    event.preventDefault();
                    event.stopPropagation();
                    activateEditorLink(link, event);
                    return;
                }

                requestAnimationFrame(updateLineStates); // Faster than setTimeout
            });
            
            hybridEditor.addEventListener('keyup', () => {
                requestAnimationFrame(updateLineStates);
            });
            
            hybridEditor.addEventListener('focus', () => {
                requestAnimationFrame(updateLineStates);
            });
            
            // Handle keyboard events
            hybridEditor.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    // Always use handleEnterKey since it now includes C cursor management
                    handleEnterKey();
                } else if (e.key === 'Backspace') {
                    // Handle backspace specially for line merging
                    const currentLine = getCurrentLineElement();
                    if (currentLine) {
                        const lineIndex = parseInt(currentLine.dataset.line);
                        const currentContent = currentLine.textContent || '';
                        const cursorAtStart = isAtLineStart(currentLine);
                        
                        console.log(`🔍 Backspace: line ${lineIndex}, content: "${currentContent}", at start: ${cursorAtStart}`);
                        
                        // Check if backspace will empty the line
                        const willEmpty = willBackspaceEmptyLine(currentLine);
                        
                        if (willEmpty) {
                            // Don't merge - let backspace empty the line first
                            console.log(`🚫 Backspace will empty line - allowing normal backspace`);
                        } else if (cursorAtStart && currentContent.length === 0 && lineIndex > 0 && lineIndex < editorLines.length) {
                            // Line is already empty and cursor at start - merge with previous line
                            e.preventDefault();
                            console.log(`🚨 Empty line merge - handling backspace at line start`);
                            handleBackspaceAtLineStart(lineIndex);
                        } else if (cursorAtStart && currentContent.length > 0 && lineIndex > 0 && lineIndex < editorLines.length) {
                            // Line has content and cursor at start - merge with previous line
                            e.preventDefault();
                            console.log(`🚨 Non-empty line merge - handling backspace at line start`);
                            handleBackspaceAtLineStart(lineIndex);
                        } else if (cursorAtStart) {
                            console.log(`🚨 At line start but can't merge: lineIndex=${lineIndex}, editorLines.length=${editorLines.length}`);
                        }
                    }
                } else if (e.key === 'Delete') {
                    // Handle delete key for line merging
                    const currentLine = getCurrentLineElement();
                    if (currentLine) {
                        const lineIndex = parseInt(currentLine.dataset.line);
                        const currentContent = currentLine.textContent || '';
                        const cursorAtEnd = isAtLineEnd(currentLine);
                        
                        console.log(`🔍 Delete: line ${lineIndex}, content: "${currentContent}", at end: ${cursorAtEnd}`);
                        
                        // If cursor is at end and there's a next line to merge
                        if (cursorAtEnd && lineIndex < editorLines.length - 1) {
                            e.preventDefault();
                            handleDeleteAtLineEnd(lineIndex);
                        }
                    }
                }
            });
            
            // Handle input changes
            hybridEditor.addEventListener('input', () => {
                // Update line contents for current line
                if (currentLineIndex >= 0 && editorLines[currentLineIndex]) {
                    if (isRefreshingEditableLine) {
                        return;
                    }

                    const currentLine = editorLines[currentLineIndex];
                    const cursorPosition = calculatePlainTextPosition(currentLine);
                    syncLineModelFromEditor(currentLineIndex);
                    console.log(`📝 Updated line ${currentLineIndex}:`, lineContents[currentLineIndex]);

                    if (currentLine.classList.contains('markdown-visible-edit')) {
                        isRefreshingEditableLine = true;
                        applyEditableMarkdownView(currentLineIndex, cursorPosition);
                        requestAnimationFrame(() => {
                            isRefreshingEditableLine = false;
                        });
                    }
                }
            });
            
            // Initial render - render all lines as HTML first
            editorLines.forEach((line, index) => {
                renderLineAsHTML(index);
            });
            
            // Then set first line as current (markdown)
            setTimeout(() => {
                currentLineIndex = 0;
                showLineAsMarkdown(0);
                updateLineClasses();
                
                // Focus first line
                if (editorLines[0]) {
                    editorLines[0].focus();
                    
                    // Place cursor at start
                    const range = document.createRange();
                    const selection = window.getSelection();
                    range.setStart(editorLines[0], 0);
                    range.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
                
                // Initialize tests after editor is ready
                if (typeof CursorTestSuite !== 'undefined') {
                    const testSuite = new CursorTestSuite({
                        mapHtmlPositionToMarkdown,
                        editorLines,
                        lineContents,
                        hybridEditor
                    });
                    
                    console.log('🧪 Running cursor behavior tests...');
                    testSuite.runAllTests();
                }
            }, 100);
        }

        // Import function
        async function activateEditorLink(anchor, event) {
            const href = anchor ? anchor.getAttribute('href') : '';
            if (!href) {
                return;
            }

            if (/^(https?:)?\/\//i.test(href) || href.startsWith('file:')) {
                if (event.metaKey || event.ctrlKey) {
                    window.open(href, '_blank', 'noopener');
                }
                return;
            }

            if (href.toLowerCase().endsWith('.md') || href.includes('/')) {
                try {
                    const response = await fetch(href);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const markdown = await response.text();
                    loadMarkdownContent(markdown);
                    console.log(`✅ Opened local markdown link: ${href}`);
                } catch (error) {
                    console.warn(`⚠️ Unable to open local markdown link "${href}":`, error);
                }
            }
        }

        function importMarkdown() {
            // Create a file input element
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.md,.markdown,.txt';
            fileInput.style.display = 'none';
            
            fileInput.onchange = function(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const content = e.target.result;
                        loadMarkdownContent(content);
                        console.log(`✅ Imported markdown file: ${file.name}`);
                    } catch (error) {
                        console.error('❌ Error importing file:', error);
                        alert('Error importing file: ' + error.message);
                    }
                };
                
                reader.onerror = function() {
                    console.error('❌ Error reading file');
                    alert('Error reading file');
                };
                
                reader.readAsText(file);
            };
            
            // Trigger file picker
            document.body.appendChild(fileInput);
            fileInput.click();
            document.body.removeChild(fileInput);
        }
        
        // Load markdown content into editor
        function loadMarkdownContent(markdownText) {
            console.log('🔄 Loading markdown content into editor...');
            
            // Split content into lines
            const lines = markdownText.split('\n');
            
            // Clear current editor
            hybridEditor.innerHTML = '';
            editorLines = [];
            lineContents = [];
            activeGroupedBlock = null;
            
            // Create new lines
            lines.forEach((lineContent, index) => {
                const lineElement = createEditorLineElement(lineContent, index);
                hybridEditor.appendChild(lineElement);
                editorLines.push(lineElement);
                lineContents.push(lineContent);
            });
            
            currentLineIndex = -1;

            // Render everything first so rich lines get measured before the
            // current markdown-visible line is activated.
            editorLines.forEach((line, index) => {
                renderLineAsHTML(index);
            });

            requestAnimationFrame(() => {
                if (!editorLines[0]) {
                    return;
                }

                currentLineIndex = 0;
                showLineAsMarkdown(0);
                updateLineClasses();
            });
            
            console.log(`✅ Loaded ${lines.length} lines into hybrid editor`);
        }

        // Export functions
        function exportMarkdown() {
            // Collect all line contents as markdown
            const content = lineContents.join('\n');
            downloadFile('document.md', content);
        }


        function downloadFile(filename, content) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async function() {
            initializeTheme();
            await initializeWasm();
            initializeHybridEditor();
            loadMarkdownContent(DEFAULT_MARKDOWN_EXAMPLE);
        });
    </script>
    
    <!-- Fixed Cursor Management System -->
    <script>
        // C-powered cursor management system
        function enhanceEnterKeyBehavior() {
            const originalHandleEnterKey = handleEnterKey;
            
            handleEnterKey = function(e) {
                console.log('🎯 Enhanced Enter key (C-powered) called');
                
                try {
                    // Get current cursor state
                    const currentLine = editorLines[currentLineIndex];
                    if (!currentLine) {
                        console.log('⚠️ No current line, using original handler');
                        return originalHandleEnterKey.call(this, e);
                    }
                    
                    const content = lineContents[currentLineIndex] || '';
                    const isMarkdownMode = currentLine.classList.contains('current-line');
                    
                    // Get cursor position
                    let cursorPosition = 0;
                    const selection = window.getSelection();
                    if (selection.rangeCount > 0) {
                        const range = selection.getRangeAt(0);
                        const preCaretRange = range.cloneRange();
                        preCaretRange.selectNodeContents(currentLine);
                        preCaretRange.setEnd(range.startContainer, range.startOffset);
                        cursorPosition = preCaretRange.toString().length;
                    }
                    
                    // Convert HTML position to markdown if needed
                    let finalPosition = cursorPosition;
                    if (!isMarkdownMode) {
                        finalPosition = mapHtmlPositionToMarkdown(cursorPosition, content);
                    }
                    
                    console.log(`📍 Current: line ${currentLineIndex}, HTML pos ${cursorPosition}, MD pos ${finalPosition}, content: "${content}"`);
                    
                    // Use C cursor management to check if we're in a problematic position
                    if (cCursorManager && cCursorManager.isReady) {
                        console.log('🔧 Using C cursor management for formatting analysis');
                        const isInsideFormatting = cCursorManager.isInsideFormatting(content, finalPosition);
                        
                        if (isInsideFormatting) {
                            console.log('📝 Position is inside formatting - will split the formatted text');
                            // Allow splitting inside formatting - this will divide the formatted content
                            // For example: "- *Ital|ique*" becomes "- *Ital" + "ique*"
                        } else {
                            // Only adjust position if we're at the boundary of formatting markers
                            const adjustedPosition = cCursorManager.adjustForFormatting(finalPosition, content);
                            
                            if (adjustedPosition !== finalPosition) {
                                console.log(`🔧 C library adjusted position: ${finalPosition} -> ${adjustedPosition}`);
                                
                                // Set the adjusted position before proceeding
                                const textNode = currentLine.firstChild;
                                if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                                    const range = document.createRange();
                                    const selection = window.getSelection();
                                    const safePos = Math.min(adjustedPosition, textNode.textContent.length);
                                    
                                    range.setStart(textNode, safePos);
                                    range.collapse(true);
                                    selection.removeAllRanges();
                                    selection.addRange(range);
                                    
                                    console.log(`✅ Cursor repositioned to ${safePos}`);
                                }
                                
                                // Small delay to let position settle
                                setTimeout(() => {
                                    originalHandleEnterKey.call(this, e);
                                }, 10);
                                return;
                            }
                        }
                        
                        console.log('✅ Position is safe for splitting');
                    } else {
                        // Fallback to JavaScript cursor management if C library not available
                        console.log('⚠️ C cursor library not ready, using fallback');
                        const adjustedPosition = adjustCursorForFormatting(content, finalPosition, isMarkdownMode);
                        if (adjustedPosition !== finalPosition) {
                            console.log(`🔧 JS fallback adjusted position: ${finalPosition} -> ${adjustedPosition}`);
                            setCursorPositionInLine(currentLine, adjustedPosition);
                            setTimeout(() => {
                                originalHandleEnterKey.call(this, e);
                            }, 5);
                            return;
                        }
                    }
                    
                } catch (error) {
                    console.log('⚠️ Error in enhanced handler:', error);
                }
                
                // Use original handler
                console.log('✅ Using original Enter key handler');
                return originalHandleEnterKey.call(this, e);
            };
        }
        
        // Adjust cursor position to avoid problematic splits in formatting
        function adjustCursorForFormatting(content, position, isMarkdownMode) {
            // Convert HTML position to markdown if needed
            let markdownPosition = position;
            if (!isMarkdownMode && typeof mapHtmlPositionToMarkdown === 'function') {
                try {
                    markdownPosition = mapHtmlPositionToMarkdown(position, content);
                    console.log(`🔄 Mapped HTML ${position} -> MD ${markdownPosition}`);
                } catch (error) {
                    console.log('⚠️ Position mapping failed:', error);
                }
            }
            
            // Check for highlight markers ==
            if (content.includes('==')) {
                const highlightStart = content.lastIndexOf('==', markdownPosition - 1);
                const highlightEnd = content.indexOf('==', markdownPosition);
                
                if (highlightStart !== -1 && highlightEnd !== -1 && highlightStart !== highlightEnd) {
                    const beforeHighlight = content.substring(0, highlightStart);
                    const highlightCount = (beforeHighlight.match(/==/g) || []).length;
                    
                    if (highlightCount % 2 === 0) {
                        console.log(`🎨 Adjusting position to before highlight: ${highlightStart}`);
                        return highlightStart;
                    }
                }
            }
            
            // Check for italic markers *
            if (content.includes('*')) {
                const italicStart = content.lastIndexOf('*', markdownPosition - 1);
                const italicEnd = content.indexOf('*', markdownPosition);
                
                if (italicStart !== -1 && italicEnd !== -1 && italicStart !== italicEnd) {
                    // Make sure it's not part of **
                    if (content[italicStart - 1] !== '*' && content[italicEnd + 1] !== '*') {
                        const beforeItalic = content.substring(0, italicStart);
                        const italicCount = (beforeItalic.match(/\*/g) || []).length;
                        
                        if (italicCount % 2 === 0) {
                            console.log(`💫 Adjusting position to before italic: ${italicStart}`);
                            return italicStart;
                        }
                    }
                }
            }
            
            return markdownPosition;
        }
        
        // Set cursor position in a line element
        function setCursorPositionInLine(lineElement, position) {
            try {
                lineElement.focus();
                
                const range = document.createRange();
                const selection = window.getSelection();
                
                const textNode = lineElement.firstChild;
                if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                    const maxPos = textNode.textContent.length;
                    const safePosition = Math.min(position, maxPos);
                    
                    range.setStart(textNode, safePosition);
                    range.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(range);
                    
                    console.log(`✅ Cursor positioned at ${safePosition}`);
                    return true;
                } else {
                    range.setStart(lineElement, 0);
                    range.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(range);
                    return true;
                }
            } catch (error) {
                console.log('❌ Error positioning cursor:', error);
                return false;
            }
        }
        
        // Initialize when editor is ready
        const originalInitializeHybridEditor = initializeHybridEditor;
        initializeHybridEditor = function() {
            originalInitializeHybridEditor.call(this);
            
            // Enhance Enter key behavior
            enhanceEnterKeyBehavior();
            
            // Test C cursor management if available
            if (cCursorManager && cCursorManager.isReady) {
                console.log('🧪 Testing C cursor management functions...');
                try {
                    // Test position adjustment
                    const testContent = "Test ==highlight== text";
                    const testPos = 7; // Inside the highlight
                    const adjusted = cCursorManager.adjustForFormatting(testPos, testContent);
                    console.log(`✅ C test: position ${testPos} adjusted to ${adjusted}`);
                    
                    // Test formatting detection
                    const isInside = cCursorManager.isInsideFormatting(testContent, testPos);
                    console.log(`✅ C test: position ${testPos} inside formatting: ${isInside}`);
                } catch (error) {
                    console.error('❌ C cursor management test failed:', error);
                }
            }
            
            console.log('🎯 Cursor positioning system initialized with C library support');
        };
    </script>
